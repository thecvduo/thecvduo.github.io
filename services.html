<!DOCTYPE html>
<html lang="ckb" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The CV Duo | نرخ و خزمەتگوزارییەکان</title>
    <meta name="description" content="نرخ و خزمەتگوزارییەکانی The CV Duo: سیڤی، ڕاپۆرت، پڕێزێنتەیشن، وەسڵ و لۆگۆ — لیستی نرخی تەواو بە دیناری عێراقی." />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="relative overflow-hidden">
      <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),_transparent_45%),radial-gradient(circle_at_85%_80%,_rgba(139,92,246,0.16),_transparent_35%)]"></div>

      <header class="relative border-b border-white/10 bg-slate-950/80 backdrop-blur-xl">
        <style>
          @media (min-width: 768px) {
            #mobile-menu-button { display: none !important; }
            #site-nav { display: flex !important; flex-direction: row !important; width: auto !important; padding-top: 0 !important; }
          }
        </style>
        <div class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between px-6 py-5">
          <a href="index.html" class="flex-shrink-0 text-xl font-semibold tracking-tight text-white">The CV Duo</a>
          <button id="mobile-menu-button" class="block text-slate-300 hover:text-white">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path id="menu-icon-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <nav id="site-nav" class="hidden w-full flex-col gap-2 pt-4 text-sm font-semibold">
            <a href="index.html" class="w-full rounded-full bg-transparent px-4 py-2 text-center text-slate-300 transition-colors hover:bg-white/5 hover:text-white md:w-auto">پەڕەی سەرەتا</a>
            <a href="services.html" aria-current="page" class="w-full rounded-full bg-sky-500/10 px-4 py-2 text-center text-sky-400 md:w-auto">نرخ و خزمەتگوزارییەکان</a>
            <a href="portfolio.html" class="w-full rounded-full bg-transparent px-4 py-2 text-center text-slate-300 transition-colors hover:bg-white/5 hover:text-white md:w-auto">نموونەی کارەکانمان</a>
            <a href="order.html" class="w-full rounded-full bg-transparent px-4 py-2 text-center text-slate-300 transition-colors hover:bg-white/5 hover:text-white md:w-auto">داواکردنی خزمەتگوزاری</a>
          </nav>
        </div>
      </header>

      <script>
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
          var nav = document.getElementById('site-nav');
          var icon = document.getElementById('menu-icon-path');
          nav.classList.toggle('hidden'); nav.classList.toggle('flex');
          icon.setAttribute('d', nav.classList.contains('hidden') ? 'M4 6h16M4 12h16M4 18h16' : 'M6 18L18 6M6 6l12 12');
        });
      </script>

      <main class="relative mx-auto w-full max-w-6xl px-6 pb-24 pt-20 md:pt-24">
        <h1 class="mb-8 text-right text-3xl font-bold text-white md:text-4xl">نرخ و خزمەتگوزارییەکان</h1>
        <section class="mb-10 grid gap-6 md:grid-cols-2">
            </section>
      </main>
    </div>
  </body>
</html>
